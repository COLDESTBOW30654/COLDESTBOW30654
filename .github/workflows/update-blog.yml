name: Update Blog Posts

on:
  schedule:
    - cron: '0 */6 * * *'   # 每6小时运行一次
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Fetch RSS and Update README
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://blog.blym.top/rss.xml"
          max_post_count: 5
          readme_path: "./README.md"
          section: "最新博客动态"          # 对应 README 中该模块的标题
          template: '<li><a href="$url">$title</a> <sub>$date</sub></li>'
          committer_username: "COLDESTBOW30654"
          committer_email: "2724008492@qq.com"
